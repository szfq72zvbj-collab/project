[build]
builder = "nixpacks"
buildCommand = "npm install"
startCommand = "npm start"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 100

[[services]]
name = "api"
root = "apps/api"
port = 3001

[[services.env]]
name = "NODE_ENV"
value = "production"

[[services.env]]
name = "PORT"
value = "3001"

[[services.env]]
name = "CORS_ORIGIN"
value = "https://your-frontend.vercel.app"